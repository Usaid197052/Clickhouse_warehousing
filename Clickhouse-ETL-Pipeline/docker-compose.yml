services:

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - etl-network

  clickhouse:
    image: clickhouse/clickhouse-server:26.6
    container_name: clickhouse
    restart: unless-stopped

    ports:
    - "8123:8123"
    - "9000:9000"

    environment:
     CLICKHOUSE_DB: ecommerce
     CLICKHOUSE_USER: admin
     CLICKHOUSE_PASSWORD: admin
     CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"

    volumes:
     - clickhouse_data:/var/lib/clickhouse

    
     - E:/MetaData/data:/import:ro

    ulimits:
     nofile:
      soft: 262144
      hard: 262144

    healthcheck:
     test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
     interval: 15s
     timeout: 5s
     retries: 10

    networks:
     - etl-network

 
  metabase:
    image: metabase/metabase:v0.61.3
    container_name: metabase
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - metabase_data:/metabase-data

    depends_on:
      clickhouse:
        condition: service_healthy

    networks:
      - etl-network

  

  airflow-init:

    build:
      context: ./docker/airflow

    container_name: airflow-init

    env_file:
      - .env

    depends_on:

      postgres:
        condition: service_healthy

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Usaid
      --lastname Ahmed
      --role Admin
      --email admin@example.com
      "

    environment:

   

     AIRFLOW__CORE__EXECUTOR: LocalExecutor

     AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

     AIRFLOW__CORE__LOAD_EXAMPLES: "False"

     AIRFLOW__WEBSERVER__SECRET_KEY: airflow-secret

     PYTHONPATH: /opt/airflow

    volumes:


     - ./:/opt/airflow

     - ./airflow/dags:/opt/airflow/dags
     - ./airflow/logs:/opt/airflow/logs
     - ./airflow/plugins:/opt/airflow/plugins

    networks:
      - etl-network

  

  airflow-scheduler:

    build:
      context: ./docker/airflow

    container_name: airflow-scheduler

    depends_on:

      airflow-init:
        condition: service_completed_successfully

    command: scheduler

    restart: unless-stopped

    env_file:
      - .env

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      PYTHONPATH: /opt/airflow

    volumes:

     - ./:/opt/airflow

     - ./airflow/dags:/opt/airflow/dags
     - ./airflow/logs:/opt/airflow/logs
     - ./airflow/plugins:/opt/airflow/plugins

    networks:
      - etl-network

  airflow-webserver:

    build:
      context: ./docker/airflow

    container_name: airflow-webserver

    depends_on:

      airflow-init:
        condition: service_completed_successfully

    command: webserver

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:

     AIRFLOW__CORE__EXECUTOR: LocalExecutor

     AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

     PYTHONPATH: /opt/airflow

    volumes:

    - ./:/opt/airflow

    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins

    healthcheck:

      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]

      interval: 30s

      timeout: 10s

      retries: 5

    networks:
      - etl-network
volumes:

  postgres_data:

  clickhouse_data:

  metabase_data:
networks:

  etl-network:
    driver: bridge